<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Waveify Music</title>
  <link rel="icon" href="assets/logo.jpg" type="image/jpeg">
  <link rel="apple-touch-icon" href="assets/logo.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=20260618-player-center-2">
  <link rel="stylesheet" href="css/animations.css?v=20260618-player-center-2">
  <link rel="stylesheet" href="css/responsive.css?v=20260618-player-center-2">
</head>
<body>
  <div class="app-shell" id="appShell">
    <aside class="sidebar" aria-label="Primary navigation">
      <a class="brand" href="#home" data-view="home" aria-label="Waveify home">
        <span class="brand-mark">
          <img src="assets/logo.jpg" alt="" aria-hidden="true">
        </span>
        <span class="brand-copy">
          <strong>Waveify</strong>
          <small>Personal stream</small>
        </span>
      </a>

      <nav class="nav-list">
        <button class="nav-item active" data-view="home" type="button" title="Home"><span class="nav-icon">⌂</span><span>Home</span></button>
        <button class="nav-item" data-view="search" type="button" title="Search"><span class="nav-icon">⌕</span><span>Search</span></button>
        <button class="nav-item" data-view="liked" type="button" title="Liked Songs"><span class="nav-icon">♡</span><span>Liked Songs</span></button>
      </nav>

      <section class="sidebar-panel">
        <div class="panel-title">Quick Mixes</div>
        <div class="quick-mix-list" id="quickMixesList"></div>
      </section>

    </aside>

    <main class="main-area">
      <header class="topbar">
        <div class="search-shell">
          <span aria-hidden="true">⌕</span>
          <input id="globalSearch" type="search" placeholder="Search songs and albums..." autocomplete="off">
        </div>
        <div class="topbar-actions">
          <button class="icon-button" id="fullscreenButton" type="button" title="Fullscreen player" aria-label="Fullscreen player">⛶</button>
        </div>
      </header>
      <section class="view-stage" id="viewStage" aria-live="polite"></section>
    </main>

    <section class="player-bar" id="playerBar" aria-label="Music player">
      <div class="now-playing">
        <img id="playerCover" src="images/playlists/default-cover.png" alt="Current song cover">
        <div class="track-copy"><strong id="playerTitle">Choose a song</strong><span id="playerArtist">Waveify is ready</span></div>
        <button class="icon-button" id="playerFavouriteButton" type="button" title="Favourite" aria-label="Favourite song">♡</button>
      </div>
      <div class="player-center">
        <div class="control-row">
          <button class="icon-button player-boost-button" id="playerBoostDownButton" type="button" title="Reduce shuffle boost" aria-label="Reduce current song shuffle boost">−</button>
          <button class="icon-button" id="shuffleButton" type="button" title="Shuffle" aria-label="Shuffle">⇄</button>
          <button class="icon-button" id="previousButton" type="button" title="Previous" aria-label="Previous">‹</button>
          <button class="play-button" id="playPauseButton" type="button" title="Play or pause" aria-label="Play or pause">▶</button>
          <button class="icon-button" id="nextButton" type="button" title="Next" aria-label="Next">›</button>
          <button class="icon-button" id="repeatButton" type="button" title="Repeat" aria-label="Repeat">↻</button>
          <button class="icon-button player-boost-button" id="playerBoostUpButton" type="button" title="Increase shuffle boost" aria-label="Increase current song shuffle boost">＋</button>
        </div>
        <div class="timeline-row"><span id="currentTime">0:00</span><input id="progressSlider" type="range" min="0" max="100" value="0" aria-label="Song progress"><span id="totalTime">0:00</span></div>
      </div>
      <div class="player-tools">
        <div class="visualiser" id="visualiser" aria-hidden="true"><span></span><span></span><span></span><span></span><span></span></div>
        <label class="crossfade-control" title="Crossfade">
          <span>Fade</span>
          <select id="crossfadeMode" aria-label="Crossfade">
            <option value="off">Off</option>
            <option value="short">Short</option>
            <option value="normal">Normal</option>
            <option value="aggressive">Aggressive</option>
          </select>
        </label>
        <span class="volume-icon" aria-hidden="true">◔</span>
        <input id="volumeSlider" type="range" min="0" max="1" step="0.01" value="0.8" aria-label="Volume">
      </div>
    </section>

    <nav class="mobile-nav" aria-label="Mobile navigation">
      <button class="mobile-nav-item active" data-view="home" type="button">⌂<span>Home</span></button>
      <button class="mobile-nav-item" data-view="search" type="button">⌕<span>Search</span></button>
      <button class="mobile-nav-item" data-view="liked" type="button">♡<span>Liked</span></button>
    </nav>
  </div>

  <div class="fullscreen-player" id="fullscreenPlayer" aria-hidden="true">
    <button class="icon-button close-fullscreen" id="closeFullscreenButton" type="button" title="Close fullscreen" aria-label="Close fullscreen">×</button>
    <img id="fullscreenCover" src="images/playlists/default-cover.png" alt="Fullscreen cover">
    <h2 id="fullscreenTitle">Choose a song</h2>
    <p id="fullscreenArtist">Waveify is ready</p>
    <div id="lyricsPanel" class="lyrics-panel"></div>
  </div>

  <audio id="audioPlayer" preload="metadata"></audio>
  <div class="toast-stack" id="toastStack" aria-live="polite"></div>

  <script src="js/library.js?v=20260618-player-center-2"></script>
  <script src="js/storage.js?v=20260618-player-center-2"></script>
  <script src="js/search.js?v=20260618-player-center-2"></script>
  <script src="js/ui.js?v=20260618-player-center-2"></script>
  <script src="js/player.js?v=20260618-player-center-2"></script>
  <script src="js/app.js?v=20260618-player-center-2"></script>
</body>
</html>
